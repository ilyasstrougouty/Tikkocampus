name: Cross-Platform Release Build

on:
  push:
    tags:
      - 'v*' # Trigger on new version tags like v1.0.0
  workflow_dispatch: # Allow manual triggers from the Actions tab

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Compile Standalone Backend
        run: python build_backend.py

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: NPM Install
        working-directory: electron-app
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f package-lock.json
          npm install

      - name: Build & Package Electron App
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The -p always flag automatically uploads the binaries to the GitHub Release
        run: npm run dist -- -p always
