name: Cross-Platform Release Build

on:
  push:
    tags:
      - 'v*' # Trigger on new version tags like v1.0.0
  workflow_dispatch: # Allow manual triggers from the Actions tab

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cleanup & Create Build Assets
        shell: pwsh
        run: |
          IF (Test-Path dist) { Remove-Item -Recurse -Force dist }
          IF (Test-Path build) { Remove-Item -Recurse -Force build }
          New-Item -ItemType File -Path cookies.txt -Force
          New-Item -ItemType File -Path targets.txt -Force

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade Pip
        run: python -m pip install --upgrade pip

      - name: Install CPU Torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install requirements.txt
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Compile Standalone Backend
        run: python build_backend.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: NPM Install
        working-directory: electron-app
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm install

      - name: Build & Package Electron App
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The -p always flag automatically uploads the binaries to the GitHub Release
        run: npm run dist -- -p always