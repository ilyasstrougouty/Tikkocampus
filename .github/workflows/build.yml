name: Cross-Platform Release Build

on:
  push:
    tags:
      - 'v*' # Trigger on new version tags like v1.0.0
  workflow_dispatch: # Allow manual triggers from the Actions tab

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Cleanup Previous Build
        run: |
          mkdir -p dist build
          rm -rf dist/* build/*

      - name: Create Build Assets
        run: |
          echo "Placeholder" > targets.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade Pip
        run: python -m pip install --upgrade pip

      - name: Install CPU Torch
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install requirements.txt
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Compile Standalone Backend
        run: python build_backend.py

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: NPM Install
        working-directory: electron-app
        run: npm ci

      - name: Build & Package Electron App
        working-directory: electron-app
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The -p always flag automatically uploads the binaries to the GitHub Release
        run: npm run dist -- -p always